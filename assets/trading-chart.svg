<svg width="1200" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Trading systems chart banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0d1117"/>
      <stop offset="0.55" stop-color="#101826"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="chartLine" x1="180" y1="0" x2="1030" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#58A6FF"/>
      <stop offset="1" stop-color="#3FB950"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="260" rx="18" fill="url(#bg)"/>

  <g opacity="0.18" stroke="#233044" stroke-width="1">
    <line x1="120" y1="50" x2="1120" y2="50"/>
    <line x1="120" y1="90" x2="1120" y2="90"/>
    <line x1="120" y1="130" x2="1120" y2="130"/>
    <line x1="120" y1="170" x2="1120" y2="170"/>
    <line x1="120" y1="210" x2="1120" y2="210"/>
    <line x1="180" y1="30" x2="180" y2="230"/>
    <line x1="320" y1="30" x2="320" y2="230"/>
    <line x1="460" y1="30" x2="460" y2="230"/>
    <line x1="600" y1="30" x2="600" y2="230"/>
    <line x1="740" y1="30" x2="740" y2="230"/>
    <line x1="880" y1="30" x2="880" y2="230"/>
    <line x1="1020" y1="30" x2="1020" y2="230"/>
  </g>

  <g opacity="0.95">
    <rect x="208" y="132" width="18" height="44" rx="4" fill="#F85149"/>
    <rect x="264" y="112" width="18" height="60" rx="4" fill="#F85149"/>
    <rect x="320" y="98" width="18" height="72" rx="4" fill="#3FB950"/>
    <rect x="376" y="88" width="18" height="86" rx="4" fill="#3FB950"/>
    <rect x="432" y="108" width="18" height="54" rx="4" fill="#F85149"/>
    <rect x="488" y="86" width="18" height="88" rx="4" fill="#3FB950"/>
    <rect x="544" y="104" width="18" height="62" rx="4" fill="#3FB950"/>
    <rect x="600" y="76" width="18" height="104" rx="4" fill="#3FB950"/>
    <rect x="656" y="90" width="18" height="84" rx="4" fill="#F85149"/>
    <rect x="712" y="70" width="18" height="110" rx="4" fill="#3FB950"/>
    <rect x="768" y="92" width="18" height="74" rx="4" fill="#3FB950"/>
    <rect x="824" y="64" width="18" height="118" rx="4" fill="#3FB950"/>
    <rect x="880" y="82" width="18" height="92" rx="4" fill="#F85149"/>
    <rect x="936" y="58" width="18" height="126" rx="4" fill="#3FB950"/>
  </g>

  <path d="M190 168 C250 160, 285 145, 330 132 C380 117, 430 138, 470 122 C530 96, 560 108, 610 92 C675 73, 705 112, 760 90 C825 64, 885 102, 945 72 C985 52, 1020 66, 1050 58" stroke="url(#chartLine)" stroke-width="4" fill="none" filter="url(#glow)" stroke-linecap="round">
    <animate attributeName="stroke-dasharray" values="0 1600;1600 0" dur="3.4s" repeatCount="indefinite"/>
  </path>

  <circle cx="1050" cy="58" r="6" fill="#58A6FF" filter="url(#glow)">
    <animate attributeName="r" values="5;8;5" dur="1.3s" repeatCount="indefinite"/>
  </circle>

  <rect x="42" y="36" width="290" height="34" rx="10" fill="#0b1220" stroke="#223047"/>
  <text x="58" y="58" fill="#58A6FF" font-size="18" font-family="'Fira Code', monospace">trading / systems / signals</text>

  <text x="48" y="224" fill="#E6EDF3" font-size="22" font-family="'Fira Code', monospace">bots · indicators · strategy tooling · market automation</text>

  <g opacity="0.88">
    <rect x="925" y="34" width="220" height="100" rx="12" fill="#0b1220" stroke="#223047"/>
    <text x="947" y="60" fill="#9fb3c8" font-size="15" font-family="'Fira Code', monospace">market_status</text>
    <text x="947" y="88" fill="#3FB950" font-size="16" font-family="'Fira Code', monospace">trend: bullish bias</text>
    <text x="947" y="112" fill="#58A6FF" font-size="16" font-family="'Fira Code', monospace">signals: active</text>
  </g>
</svg>
