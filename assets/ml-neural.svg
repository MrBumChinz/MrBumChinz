<svg width="1200" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ML neural network banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0d1117"/>
      <stop offset="0.5" stop-color="#0f1724"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="pulse" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(0 0) rotate(90) scale(16)">
      <stop stop-color="#58A6FF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#58A6FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="260" rx="18" fill="url(#bg)"/>

  <g opacity="0.14" stroke="#1f6feb" stroke-width="1.2">
    <path d="M120 180 C220 110, 320 120, 430 150 S650 220, 760 140 S980 80, 1080 140"/>
    <path d="M100 90 C220 140, 300 80, 420 120 S650 170, 760 100 S980 40, 1100 95"/>
    <path d="M90 220 C240 170, 330 200, 480 180 S720 130, 850 165 S1010 210, 1120 175"/>
  </g>

  <g stroke="#2f81f7" stroke-width="2" opacity="0.45">
    <line x1="170" y1="150" x2="300" y2="95"/>
    <line x1="170" y1="150" x2="325" y2="185"/>
    <line x1="300" y1="95" x2="470" y2="135"/>
    <line x1="325" y1="185" x2="470" y2="135"/>
    <line x1="470" y1="135" x2="640" y2="90"/>
    <line x1="470" y1="135" x2="650" y2="190"/>
    <line x1="640" y1="90" x2="825" y2="130"/>
    <line x1="650" y1="190" x2="825" y2="130"/>
    <line x1="825" y1="130" x2="1010" y2="95"/>
    <line x1="825" y1="130" x2="1015" y2="190"/>
  </g>

  <g filter="url(#glow)">
    <circle cx="170" cy="150" r="8" fill="#58A6FF"/>
    <circle cx="300" cy="95" r="7" fill="#3FB950"/>
    <circle cx="325" cy="185" r="7" fill="#3FB950"/>
    <circle cx="470" cy="135" r="10" fill="#58A6FF"/>
    <circle cx="640" cy="90" r="7" fill="#3FB950"/>
    <circle cx="650" cy="190" r="7" fill="#3FB950"/>
    <circle cx="825" cy="130" r="10" fill="#58A6FF"/>
    <circle cx="1010" cy="95" r="7" fill="#3FB950"/>
    <circle cx="1015" cy="190" r="7" fill="#3FB950"/>
  </g>

  <circle cx="170" cy="150" r="18" fill="url(#pulse)">
    <animate attributeName="r" values="12;24;12" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="470" cy="135" r="18" fill="url(#pulse)">
    <animate attributeName="r" values="12;26;12" dur="2.8s" begin="0.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.75;0.2" dur="2.8s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="825" cy="130" r="18" fill="url(#pulse)">
    <animate attributeName="r" values="12;26;12" dur="2.6s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.75;0.2" dur="2.6s" begin="0.8s" repeatCount="indefinite"/>
  </circle>

  <rect x="40" y="36" width="320" height="34" rx="10" fill="#0b1220" stroke="#223047"/>
  <text x="58" y="58" fill="#58A6FF" font-size="18" font-family="'Fira Code', monospace">ml / neural / inference systems</text>

  <text x="48" y="224" fill="#E6EDF3" font-size="22" font-family="'Fira Code', monospace">active learning · model-driven tooling · intelligent automation</text>

  <g opacity="0.8">
    <rect x="922" y="34" width="218" height="92" rx="12" fill="#0b1220" stroke="#223047"/>
    <text x="944" y="60" fill="#9fb3c8" font-size="15" font-family="'Fira Code', monospace">inference_status</text>
    <text x="944" y="88" fill="#3FB950" font-size="16" font-family="'Fira Code', monospace">signal: stable</text>
    <text x="944" y="112" fill="#58A6FF" font-size="16" font-family="'Fira Code', monospace">learning: active</text>
  </g>
</svg>
