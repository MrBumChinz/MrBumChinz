<svg width="1200" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cyber terminal status banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0d1117"/>
      <stop offset="0.5" stop-color="#111827"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#58A6FF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#58A6FF" stop-opacity="1"/>
      <stop offset="1" stop-color="#58A6FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1f2937" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="260" rx="18" fill="url(#bg)"/>
  <rect width="1200" height="260" rx="18" fill="url(#grid)" opacity="0.45"/>

  <rect x="24" y="24" width="1152" height="28" rx="8" fill="#0b1220" stroke="#223047"/>
  <circle cx="46" cy="38" r="6" fill="#ff5f56"/>
  <circle cx="66" cy="38" r="6" fill="#ffbd2e"/>
  <circle cx="86" cy="38" r="6" fill="#27c93f"/>
  <text x="112" y="43" fill="#9fb3c8" font-size="14" font-family="'Fira Code', monospace">james@terminal: ~/systems/status</text>

  <line x1="40" y1="78" x2="1160" y2="78" stroke="url(#line)" stroke-width="2" filter="url(#glow)">
    <animate attributeName="x1" values="-200;1200" dur="3.8s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="0;1400" dur="3.8s" repeatCount="indefinite"/>
  </line>

  <text x="50" y="112" fill="#58A6FF" font-size="20" font-family="'Fira Code', monospace">&gt; whoami</text>
  <text x="210" y="112" fill="#E6EDF3" font-size="20" font-family="'Fira Code', monospace">Mr Bumchinz / James</text>

  <text x="50" y="145" fill="#58A6FF" font-size="20" font-family="'Fira Code', monospace">&gt; status</text>
  <text x="210" y="145" fill="#3FB950" font-size="20" font-family="'Fira Code', monospace">self-taught · self-employed · online</text>

  <text x="50" y="178" fill="#58A6FF" font-size="20" font-family="'Fira Code', monospace">&gt; focus</text>
  <text x="210" y="178" fill="#E6EDF3" font-size="20" font-family="'Fira Code', monospace">cybersecurity · trading systems · machine learning · automation</text>

  <text x="50" y="211" fill="#58A6FF" font-size="20" font-family="'Fira Code', monospace">&gt; objective</text>
  <text x="210" y="211" fill="#E6EDF3" font-size="20" font-family="'Fira Code', monospace">build useful systems, ship fast, make them hard to break</text>

  <rect x="1040" y="194" width="10" height="22" fill="#58A6FF">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>
